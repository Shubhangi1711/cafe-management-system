<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
</head>
<style>
    body{
        background-image:url("cafe.jpg"); 
        height:100%; 
        width:100%;
        background-position: center center;
        background-repeat: no-repeat;
        filter: brightness(70%);
        display: flex;
        justify-content:center;
        align-items: center;
        height: 100vh;
    }
    .form-area{
        width: 35%;
        border:1px solid #421212;
        border-radius: 15px;
        padding:15px;
    }
    input{
        width:95%;
        padding:10px;
        margin-bottom: 15px;

    }
    button{
        width:100%;
        background-color: #800598;
        border:2px solid transparent;
        cursor:pointer;
        padding:15px;
        font-size: 18px;
        color: #fff;
        letter-spacing: 1px;
    }
    button:hover{
        background-color: transparent;
        border:2px solid #800598;
        color: #000;
    }
</style>
<body>
    <div class="form-area">
        <form action="">
            <input type="text" placeholder="Name">
            <input type="password" placeholder="Password">
            <button>
                Login
            </button>
        </form>
    </div>
    
</body>
</html>
